name: Sealora Build
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
      - uses: gradle/actions/setup-gradle@v3
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: chmod +x gradlew
      - run: |
          cd app
          keytool -genkeypair -v -keystore keystore.jks -alias sealora -keyalg RSA -keysize 2048 -validity 10000 -storepass sealora123 -keypass sealora123 -dname "CN=Sealora, OU=Dev, O=Omersusin, L=Istanbul, ST=Istanbul, C=TR"
      - run: ./gradlew assembleDebug --no-daemon
      - name: Release APK
        id: release
        continue-on-error: true
        run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sealora-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        if: steps.release.outcome == 'success'
        with:
          name: sealora-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: sealora-release-apk, path: ./artifacts }
      - uses: actions/download-artifact@v4
        with: { name: sealora-debug-apk, path: ./artifacts-debug }
      - run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: version
      - uses: softprops/action-gh-release@v1
        with:
          name: "Sealora v${{ steps.version.outputs.VERSION }}"
          files: ./artifacts/*.apk,./artifacts-debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
